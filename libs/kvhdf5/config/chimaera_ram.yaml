# Content Transfer Engine (CTE) Configuration File
# GPU configuration with pinned host + HBM storage tiers.
# Mirrors iowarp-core's context-transfer-engine/benchmark/cte_config_gpu.yaml
# — the GPU CTE runtime requires GPU-visible storage tiers to be declared
# in the compose section at startup; dynamic AsyncRegisterTarget() only
# registers on the CPU side and leaves the GPU-side target list empty.
networking:
  port: 9413
  neighborhood_size: 32

runtime:
  num_threads: 4
  queue_depth: 1024
  first_busy_wait: 10000
  max_sleep: 50000

gpu:
  blocks: 1
  threads_per_block: 32
  queue_depth: 256

compose:
  # RAM bdev (required by runtime)
  - mod_name: chimaera_bdev
    pool_name: "ram::chi_default_bdev"
    pool_query: local
    pool_id: "301.0"
    bdev_type: ram
    capacity: "512MB"

  # CTE pool with GPU storage tiers
  - mod_name: wrp_cte_core
    pool_name: cte_main
    pool_query: local
    pool_id: 512.0

    targets:
      neighborhood: 1
      default_target_timeout_ms: 30000
      poll_period_ms: 5000

    storage:
      # Pinned host memory tier (lower priority)
      - path: "pinned::cte_pinned_tier"
        bdev_type: "pinned"
        capacity_limit: "256MB"
        score: 0.5

      # GPU High-Bandwidth Memory tier (higher priority)
      - path: "hbm::cte_hbm_tier"
        bdev_type: "hbm"
        capacity_limit: "256MB"
        score: 1.0

    dpe:
      dpe_type: "max_bw"
