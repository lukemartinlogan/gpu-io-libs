# Content Transfer Engine (CTE) Configuration File
# RAM-only storage configuration for benchmark testing
runtime:
  num_threads: 4
  queue_depth: 1024
  first_busy_wait: 10000

compose:
  - mod_name: wrp_cte_core
    pool_name: wrp_cte
    pool_query: local
    pool_id: 512.0
    targets:
      neighborhood: 1
      default_target_timeout_ms: 30000
      poll_period_ms: 5000
    storage:
      - path: "ram::cte_ram_tier1"
        bdev_type: "ram"
        capacity_limit: "16GB"
        score: 1.0
    dpe:
      dpe_type: "max_bw"
